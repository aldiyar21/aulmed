{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h1 class="page-title">{{ document.title }}</h1>
    <p><strong>{% trans "Number" %}:</strong> {{ document.number|default:"-" }}</p>
    <p><strong>{% trans "Type" %}:</strong> {{ document.get_document_type_display }}</p>
    <p>{{ document.content|linebreaks }}</p>
  </div>
</div>
{% endblock %}
