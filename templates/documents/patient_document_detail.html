{% extends "base.html" %}{% load i18n %}{% block content %}<div class="page-header"><div><h1 class="page-title">{{ document.title }}</h1></div><div class="page-actions"><a class="btn btn-outline-secondary" href="{% url 'printable-document' document.pk %}">{% trans "Printable" %}</a></div></div><div class="card"><div class="card-body"><p><strong>{% trans "Number" %}:</strong> {{ document.number }}</p><p><strong>{% trans "Content" %}:</strong></p><p>{{ document.content|linebreaks }}</p></div></div>{% endblock %}
