{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{{ title }}</h1>
    <p class="page-subtitle">{% trans "Enter the patient's current vital signs for follow-up and remote monitoring." %}</p>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <form method="post" class="smart-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-success mt-3" type="submit">{% trans "Save" %}</button>
    </form>
  </div>
</div>
{% endblock %}
