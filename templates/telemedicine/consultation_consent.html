{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{% trans "Consent to telemedicine consultation" %}</h1>
    <p class="page-subtitle">{% trans "Review the terms of remote consultation before joining the video room." %}</p>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <p>{{ consent_text }}</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-success" type="submit">{% trans "Accept and continue" %}</button>
    </form>
  </div>
</div>
{% endblock %}
